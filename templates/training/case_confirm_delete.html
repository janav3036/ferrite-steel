{% extends 'base.html' %}
{% block title %}Delete Case — Ferrite Steel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header fw-semibold text-danger">Delete Case</div>
            <div class="card-body">
                <p>Are you sure you want to permanently delete:</p>
                <p class="fw-semibold">{{ case.title }}</p>
                <p class="text-muted small">This action cannot be undone.</p>
                <div class="d-flex gap-2">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, delete</button>
                    </form>
                    <a href="{% url 'case_detail' case.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
