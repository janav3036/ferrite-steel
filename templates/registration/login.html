<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Ferrite Steel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', system-ui, sans-serif; }

        .auth-wrap { min-height: 100vh; display: flex; }

        /* Brand panel */
        .auth-brand {
            width: 42%;
            background: #0F172A;
            display: flex;
            flex-direction: column;
            padding: 52px 48px;
            position: relative;
            overflow: hidden;
        }
        .auth-brand::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 26px 26px;
        }
        .auth-brand::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,.18) 0%, transparent 65%);
            bottom: -160px; right: -140px;
            pointer-events: none;
        }
        .brand-content {
            position: relative; z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .brand-mark {
            width: 44px; height: 44px;
            background: #3B82F6;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: .82rem; font-weight: 700; color: white;
            letter-spacing: .04em;
            margin-bottom: 22px;
        }
        .brand-tagline {
            color: rgba(255,255,255,.38);
            font-size: .83rem;
            margin-top: 6px;
            line-height: 1.6;
        }
        .brand-footer {
            position: relative; z-index: 1;
            color: rgba(255,255,255,.2);
            font-size: .72rem;
        }

        /* Form panel */
        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8FAFC;
            padding: 48px 40px;
        }
        .auth-box { width: 100%; max-width: 360px; }
        .auth-box h2 {
            font-size: 1.35rem; font-weight: 700;
            letter-spacing: -.02em;
            color: #0F172A;
            margin-bottom: 4px;
        }
        .auth-sub { color: #64748B; font-size: .84rem; margin-bottom: 26px; }

        .form-label { font-size: .82rem; font-weight: 500; color: #374151; margin-bottom: 5px; }
        .form-control {
            font-family: 'DM Sans', sans-serif;
            font-size: .87rem;
            border-color: #E2E8F0;
            border-radius: 6px;
            padding: 9px 12px;
            color: #0F172A;
        }
        .form-control:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .btn-primary {
            background: #2563EB; border-color: #2563EB;
            font-family: 'DM Sans', sans-serif;
            font-size: .87rem; font-weight: 500;
            padding: 9px 16px;
            border-radius: 6px;
        }
        .btn-primary:hover { background: #1D4ED8; border-color: #1D4ED8; }
        .auth-links { margin-top: 20px; text-align: center; }
        .auth-links a {
            font-size: .8rem; color: #64748B;
            text-decoration: none; display: block; margin-bottom: 6px;
        }
        .auth-links a:hover { color: #2563EB; }
        .auth-links a.dimmer { color: #94A3B8; }

        @media (max-width: 640px) {
            .auth-brand { display: none; }
            .auth-form-side { background: white; }
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-brand">
            <div class="brand-content">
                <div class="brand-mark">FS</div>
                <h1 style="color:white;font-size:1.6rem;font-weight:700;letter-spacing:-.03em;">Ferrite Steel</h1>
                <p class="brand-tagline">Distribution Management System</p>
            </div>
            <div class="brand-footer">© Ferrite Steel & Distributions</div>
        </div>

        <div class="auth-form-side">
            <div class="auth-box">
                <h2>Sign in</h2>
                <p class="auth-sub">Enter your credentials to continue.</p>

                {% if form.errors %}
                <div class="alert alert-danger py-2 mb-3" style="font-size:.82rem;border-radius:6px;">
                    Invalid username or password.
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>

                <div class="auth-links">
                    <a href="{% url 'register' %}">New employee? Request an account</a>
                    <a href="{% url 'password_reset' %}" class="dimmer">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
