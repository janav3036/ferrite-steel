<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Ferite Steel & Distributions</title>
    </head>
    <body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <div class="vh-100 d-flex align-items-center justify-content-center">
            <div class="card w-100" style="max-width: 400px;">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <h3>Ferite Steel & Distribution</h3>
                        <div class="mb-3">
                            <label><strong>Username</strong></label>
                            <input type="text" name="username" placeholder="Enter username" required class="form-control">
                        </div>
                        <div class="mb-3">
                            <label><strong>Password</strong></label>
                            <input type="password" name="password" placeholder="Enter password" required class="form-control">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <p class="text-center text-muted small mt-3 mb-0">
                        New employee? <a href="{% url 'register' %}">Request an account</a>
                    </p>
                    <p class="text-center text-muted small mt-2 mb-0">
                        <a href="{% url 'password_reset' %}">Forgot your password?</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
