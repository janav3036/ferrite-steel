<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Ferrite Steel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', system-ui, sans-serif; background: #F1F5F9; }
        .auth-center { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card {
            width: 100%; max-width: 400px;
            background: white; border: 1px solid #E2E8F0;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(15,23,42,.07);
            overflow: hidden;
        }
        .auth-card-top {
            background: #0F172A;
            padding: 20px 24px;
            display: flex; align-items: center; gap: 10px;
        }
        .brand-mark {
            width: 28px; height: 28px; background: #3B82F6;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: .66rem; font-weight: 700; color: white; letter-spacing: .04em;
        }
        .auth-card-body { padding: 28px 24px; }
        .form-label { font-size: .82rem; font-weight: 500; color: #374151; margin-bottom: 5px; }
        .form-control {
            font-family: 'DM Sans', sans-serif; font-size: .87rem;
            border-color: #E2E8F0; border-radius: 6px; padding: 9px 12px;
        }
        .form-control:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .btn-primary {
            background: #2563EB; border-color: #2563EB;
            font-family: 'DM Sans', sans-serif; font-size: .87rem;
            font-weight: 500; padding: 9px 16px; border-radius: 6px;
        }
        .btn-primary:hover { background: #1D4ED8; border-color: #1D4ED8; }
        .back-link { font-size: .8rem; color: #94A3B8; text-decoration: none; display: block; text-align: center; margin-top: 16px; }
        .back-link:hover { color: #2563EB; }
    </style>
</head>
<body>
    <div class="auth-center">
        <div class="auth-card">
            <div class="auth-card-top">
                <div class="brand-mark">FS</div>
                <span style="color:rgba(255,255,255,.85);font-size:.87rem;font-weight:600;">Ferrite Steel</span>
            </div>
            <div class="auth-card-body">
                <h5 style="font-weight:700;letter-spacing:-.02em;margin-bottom:4px;">Reset Password</h5>
                <p style="color:#64748B;font-size:.83rem;margin-bottom:22px;">
                    Enter your registered email and we'll send a reset link.
                </p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <a href="{% url 'login' %}" class="back-link">← Back to sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
